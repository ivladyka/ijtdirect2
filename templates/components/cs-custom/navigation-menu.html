<nav class="navPages a">
    <ul class="navPages-list d-flex sf-menu align-v-center justify-center flex-wrap {{#if theme_settings.navigation_design '!==' 'simple'}} navPages-list-depth-max{{/if}}">
        {{#each categories}}
            <li class="navPages-item">
              {{#if children}}
              <a class="navPages-action has-subMenu" href="{{url}}">
                  {{name}} <i class="icon-arrow-1-down"></i>
              </a>

                  <ul class="navPage-subMenu-list">
                      {{#each children}}
                          <li class="navPage-subMenu-item">
                              {{#if children}}
                                  <a class="navPage-subMenu-action navPages-action has-subMenu"
                                      href="{{url}}"
                                      {{#if mobilemenu '!=' 'yes'}}
                                      data-collapsible="navPages-{{id}}"
                                      data-collapsible-disabled-breakpoint="medium"
                                      data-collapsible-disabled-state="open"
                                      data-collapsible-enabled-state="closed"
                                      {{/if}}>
                                      {{name}} <svg><use xlink:href="#icon-chevron-right"></use></svg>
                                  </a>
                                  <ul class="navPage-childList" id="navPages-{{id}}">
                                      {{#each children}}
                                      <li class="navPage-childList-item">
                                          <a class="navPage-childList-action navPages-action" href="{{url}}">{{name}}</a>
                                      </li>
                                      {{/each}}
                                  </ul>
                              {{else}}
                                  <a class="navPage-subMenu-action navPages-action" href="{{url}}">{{name}}</a>
                              {{/if}}
                          </li>
                      {{/each}}
                  </ul>
              {{else}}
              <a class="navPages-action" href="{{url}}">{{name}}</a>
              {{/if}}

            </li>
        {{/each}}
    </ul>
</nav>
