<form class="form" action="{{urls.search}}">
    <fieldset class="form-fieldset">
        <div class="form-field d-flex align-v-center">
            <label class="is-srOnly" for="search_query">{{lang "search.quick_search.input_label"}}</label>
            <input class="form-input" data-search-quick name="search_query" id="search_query1" data-error-message="{{lang 'search.error.empty_field'}}" placeholder="{{lang 'search.quick_search.input_placeholder'}}" autocomplete="off">
            <button class="search-button" type="submit"><svg><use xlink:href="#icon-search"></use></svg></button>
        </div>
    </fieldset>
</form>
