<form class="form" action="{{urls.search}}">
    <fieldset class="form-fieldset">
        <div class="form-field d-flex align-v-center">
            <label class="is-srOnly" for="search_query">{{lang "search.quick_search.input_label"}}</label>
            <input class="form-input" data-search-quick name="search_query" id="search_query" data-error-message="{{lang 'search.error.empty_field'}}" placeholder="{{lang 'search.quick_search.input_placeholder'}}" autocomplete="off">
            <button class="search-button" type="submit" aria-label="Search"><svg viewBox="0 0 24 24" fill="none"><g stroke-width="0" stroke-linecap="round" stroke-linejoin="round"></g><path d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z" stroke="#000000" fill="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
        </div>
    </fieldset>
</form>
<section class="quickSearchResults" data-bind="html: results"></section>
