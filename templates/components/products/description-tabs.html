{{inject "productId" product.id}}

<ul class="tabs">
    <li class="tab">
        <a class="tab-title" href="#tab-description">{{lang 'products.description'}}</a>
    </li>
    <li class="tab">
        <a class="tab-title" href="#tab-spec">{{lang 'products.specification'}}</a>
    </li>
    {{#if pageYield '===' true}}
    <li class="tab">
        <a class="tab-title" href="#tab-compatible">{{lang 'products.compatible'}}</a>
    </li>
    {{else}}
    <li class="tab">
        <a class="tab-title" href="#tab-review">{{lang 'products.expert_reviews'}}</a>
    </li>
    {{/if}}
</ul>

<div class="tabs-contents">
    {{{product.description}}}
</div>
