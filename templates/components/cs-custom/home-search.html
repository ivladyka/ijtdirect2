<div class="home-search" >
    <div class="container">
        <div class="home-search-box">
            <h1 class="home-search-title">Find What You Need in <strong>Seconds.</strong></h1>
            <form class="form" action="{{urls.search}}">
                <fieldset class="form-fieldset">
                    <div class="form-field d-flex align-v-center">
                        <label class="is-srOnly" for="search_query">{{lang "search.quick_search.input_label"}}</label>
                        <input class="form-input" data-search-quick name="search_query" id="search_query" data-error-message="{{lang 'search.error.empty_field'}}" placeholder="{{lang 'search.quick_search.input_placeholder'}}" autocomplete="off">
                        <button class="search-button" type="submit" aria-label="Search">
                            <svg width="31" height="30" viewBox="0 0 31 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M23 12.5C23 6.9875 18.5125 2.5 13 2.5C7.4875 2.5 3 6.9875 3 12.5C3 18.0125 7.4875 22.5 13 22.5C15.3125 22.5 17.425 21.7125 19.125 20.3875L25.5 26.7625L27.2625 25L20.8875 18.625C22.2 16.925 23 14.8125 23 12.5ZM5.5 12.5C5.5 8.3625 8.8625 5 13 5C17.1375 5 20.5 8.3625 20.5 12.5C20.5 16.6375 17.1375 20 13 20C8.8625 20 5.5 16.6375 5.5 12.5Z" fill="#2A66C6" />
                            </svg>
                        </button>
                    </div>
                </fieldset>
            </form>
            <section class="quickSearchResults" data-bind="html: results"></section>
        </div>
    </div>
</div>
